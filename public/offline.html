<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sin conexión — MathCariola</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    .card {
      max-width: 420px;
      width: 100%;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 1.25rem;
      padding: 3rem 2rem;
    }
    .icon { font-size: 4rem; margin-bottom: 1rem; }
    h1 { font-size: 1.5rem; font-weight: 700; color: #818cf8; margin-bottom: 0.75rem; }
    p { font-size: 0.9rem; color: #94a3b8; line-height: 1.6; margin-bottom: 2rem; }
    button {
      background: #6366f1;
      color: white;
      border: none;
      border-radius: 0.75rem;
      padding: 0.75rem 2rem;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: #818cf8; }
    .math { font-size: 2rem; color: #475569; margin-top: 1.5rem; font-family: monospace; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>Sin conexión</h1>
    <p>
      MathCariola necesita conexión a internet para cargar los módulos interactivos.
      Verifica tu conexión y vuelve a intentarlo.
    </p>
    <button onclick="window.location.reload()">Reintentar</button>
    <div class="math">∑ · ∫ · ∂ · λ</div>
  </div>
</body>
</html>
